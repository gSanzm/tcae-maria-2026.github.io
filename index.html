<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Universae</title>
<style>
  body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
  h1, h2, h3 { margin-top: 20px; }
  button { margin: 5px; padding: 8px 14px; cursor: pointer; }
  .asignatura-btn { display: block; margin: 8px 0; padding: 10px; width: 100%; text-align: left; font-size: 1rem; }
  .opciones label { display: block; margin: 6px 0; cursor: pointer; }
  .correcta { color: green; font-weight: bold; }
  .incorrecta { color: red; }
  .resaltada { background: #ffffcc; }
  #pregunta-container { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
  #resultado-final { font-size: 1.2rem; font-weight: bold; margin: 20px 0; }
  #navegacion { margin: 15px 0; }

  .hidden { display: none; }
  #progreso { margin: 10px 0; color: #555; }
</style>
</head>
<body>

<div id="vista-inicio">
  <h1>Test Universae</h1>
  <p>Selecciona una asignatura:</p>
  <div id="lista-asignaturas"></div>
</div>

<div id="vista-asignatura" class="hidden">
  <button onclick="irInicio()">← Volver</button>
  <h2 id="nombre-asignatura"></h2>
  <button onclick="generarTest()">Generar test (50 preguntas)</button>
  <button onclick="generarTestCompleto()">Generar examen completo</button>
  <button onclick="verFalladas()">Preguntas falladas (<span id="num-falladas">0</span>)</button>
</div>

<div id="vista-test" class="hidden">
  <button onclick="irAsignatura()">← Volver</button>
  <h2 id="test-titulo"></h2>
  <div id="progreso"></div>
  <div id="pregunta-container"></div>
  <div id="navegacion">
    <button id="btn-anterior" onclick="preguntaAnterior()">← Anterior</button>
    <button id="btn-siguiente" onclick="preguntaSiguiente()">Siguiente →</button>
    <button id="btn-finalizar" onclick="finalizarTest()" class="hidden">Finalizar test</button>
  </div>
</div>

<div id="vista-resultado" class="hidden">
  <button onclick="irAsignatura()">← Volver a la asignatura</button>
  <h2>Resultado</h2>
  <div id="resultado-final"></div>
  <button onclick="repasarFalladas()">Repasar falladas ahora</button>
  <button onclick="generarTest()">Nuevo test</button>
</div>

<div id="vista-falladas" class="hidden">
  <button onclick="irAsignatura()">← Volver</button>
  <h2>Preguntas falladas</h2>
  <div id="lista-falladas"></div>
</div>

<div id="vista-repaso" class="hidden">
  <button onclick="irAsignatura()">← Volver</button>
  <h2>Repaso de falladas</h2>
  <div id="progreso-repaso"></div>
  <div id="repaso-container"></div>
  <div id="navegacion-repaso">
    <button id="btn-ant-repaso" onclick="repasoAnterior()">← Anterior</button>
    <button id="btn-sig-repaso" onclick="repasoSiguiente()">Siguiente →</button>
    <button id="btn-fin-repaso" onclick="finalizarRepaso()" class="hidden">Finalizar repaso</button>
  </div>
</div>

to de roles", "D": "Ninguna es correcta"}, "correcta": "Intragrupal"}, {"enunciado": "Los costes de oportunidad son:", "opciones": {"A": "El estrés y las enfermedades relacionadas con el trabajo", "B": "Los costes derivados de los procesos legales, arbitrajes y peritajes", "C": "La pérdida de ingresos debido a la baja productividad y clientes que se van", "D": "La falta de compromiso con la organización"}, "correcta": "La pérdida de ingresos debido a la baja productividad y clientes que se van"}, {"enunciado": "Si en un conflicto interviene una tercera persona externa ajena al conflicto, y su función consiste en reunir a las partes para que se debatan las opciones de resolución del conflicto y lleguen a un acuerdo, el método aplicado habrá sido:", "opciones": {"A": "Arbitraje", "B": "Negociación", "C": "Confrontación", "D": "Mediación"}, "correcta": "Mediación"}, {"enunciado": "Si en un conflicto interviene una tercera persona externa, el cual estudia la raíz del conflicto y emite un informe que se tiene en cuenta como una resolución oficial y de obligado cumplimiento, el método aplicado habrá sido:", "opciones": {"A": "Arbitraje", "B": "Negociación", "C": "Confrontación", "D": "Conciliación"}, "correcta": "Arbitraje"}, {"enunciado": "Si la decisión a tomar es la que toman los empleados en su día a día, se trata de una decisión:", "opciones": {"A": "De riesgo", "B": "De dirección", "C": "Estratégica", "D": "Ninguna es correcta"}, "correcta": "Ninguna es correcta"}, {"enunciado": "Si la decisión a tomar tiene que ver con el futuro de la organización, se trata de una decisión:", "opciones": {"A": "De dirección", "B": "Operativa", "C": "Estratégica", "D": "Rutinaria"}, "correcta": "Estratégica"}, {"enunciado": "Si se tiene que tomar una decisión en la que las dos alternativas son positivas, se trata de un conflicto intrapersonal de intereses, pero más concretamente, de un conflicto:", "opciones": {"A": "Evasión-evasión", "B": "Enfoque-enfoque", "C": "Enfoque-evasión", "D": "Positivo-positivo"}, "correcta": "Enfoque-enfoque"}, {"enunciado": "Un conflicto se produce cuando:", "opciones": {"A": "Las opiniones son las mismas", "B": "Existen intereses, necesidades, deseos o valores distintos", "C": "Los recursos para realizar el trabajo son los necesarios", "D": "Ninguna es correcta"}, "correcta": "Existen intereses, necesidades, deseos o valores distintos"}]}, {"tema": 4, "preguntas": [{"enunciado": "¿Cómo se denomina el estilo de mando donde el líder decide, pero todos opinan?", "opciones": {"A": "Autoritario.", "B": "Vendedor.", "C": "Consultivo.", "D": "Democrático."}, "correcta": "Consultivo."}, {"enunciado": "¿Cuál de las siguientes no es una capacidad específica de los directivos?", "opciones": {"A": "Inteligencia emocional.", "B": "Capacidad de comunicar.", "C": "Carisma.", "D": "Capacidad de delegar."}, "correcta": "Carisma."}, {"enunciado": "¿Cuál es una función de los directivos?", "opciones": {"A": "Planificar.", "B": "Gestionar.", "C": "Organizar.", "D": "Todas las anteriores."}, "correcta": "Todas las anteriores."}, {"enunciado": "¿Qué se busca hoy en día en las figuras directivas de la empresa?", "opciones": {"A": "Imposición y coerción.", "B": "La desaparición de estas figuras.", "C": "Liderazgo.", "D": "Ninguna de las anteriores."}, "correcta": "Liderazgo."}, {"enunciado": "¿Qué teoría defiende que los líderes nacen, no se hacen?", "opciones": {"A": "Teoría del gran hombre.", "B": "Teoría X e Y.", "C": "Teoría de la malla gerencial.", "D": "Teoría del liderazgo situacional."}, "correcta": "Teoría del gran hombre."}, {"enunciado": "A la habilidad de guiar a la gente sin necesidad de una autoridad otorgada se la conoce como:", "opciones": {"A": "Delegación.", "B": "Liderazgo.", "C": "Resiliencia.", "D": "Integridad."}, "correcta": "Liderazgo."}, {"enunciado": "En la teoría del liderazgo situacional se distinguen dos variables fundamentales:", "opciones": {"A": "Actitud y autoridad.", "B": "Interés por las personas e int onal, ¿a qué nos referimos cuando hablamos de módulos?", "opciones": {"A": "Módulo es sinónimo de ciclo formativo.", "B": "El módulo es lo que proporciona el título de Formación Profesional.", "C": "Hablar de módulos en FP es como hablar de asignaturas.", "D": "A y B son correctas."}, "correcta": "Hablar de módulos en FP es como hablar de asignaturas."}, {"enunciado": "En relación con el CV, señale la respuesta incorrecta:", "opciones": {"A": "Es lo mismo que una carta de presentación.", "B": "Se deben resaltar aspectos que realcen el perfil del candidato.", "C": "Cada candidato debe adaptarlo a sus necesidades.", "D": "Se utiliza como vía para darse a conocer en el mundo laboral."}, "correcta": "Es lo mismo que una carta de presentación."}, {"enunciado": "Entre los medios más utilizados para la búsqueda de empleo no se encuentran:", "opciones": {"A": "Las bolsas de trabajo.", "B": "Las ETT.", "C": "Los servicios públicos de empleo.", "D": "Las entidades EBEP."}, "correcta": "Las entidades EBEP."}, {"enunciado": "La Formación Profesional se estructura a través de:", "opciones": {"A": "Grados Superiores reunidos en 52 unidades profesionales.", "B": "Cualificaciones Profesionales reunidas en las 10 grandes familias profesionales.", "C": "Ciclos Formativos reunidos en 26 familias profesionales.", "D": "La Declaración de Bolonia de 1999."}, "correcta": "Ciclos Formativos reunidos en 26 familias profesionales."}, {"enunciado": "La orientación profesional se enfoca en guiar al alumno hacia las diferentes opciones laborales futuras que tiene, entre las que se encuentra:", "opciones": {"A": "El funcionariado.", "B": "El trabajo por cuenta propia.", "C": "El trabajo por cuenta ajena.", "D": "Todas son correctas."}, "correcta": "Todas son correctas."}]}, {"tema": 2, "preguntas": [{"enunciado": "Cuál de las siguientes no es una característica de la escucha activa:", "opciones": {"A": "Empatizar con el emisor del mensaje.", "B": "Tener en cuenta los elementos paraverbales y no verbales.", "C": "Mantener una única posición respecto a la cuestión.", "D": "Comprensión del mensaje."}, "correcta": "Mantener una única posición respecto a la cuestión."}, {"enunciado": "Cuando se dice que el resultado final se obtiene solo como fruto de las aportaciones individuales de cada individuo estamos ante:", "opciones": {"A": "Un equipo de trabajo.", "B": "Un grupo de trabajo.", "C": "Trabajo en equipo.", "D": "Todas las respuestas anteriores son correctas, pues son términos sinónimos entre sí."}, "correcta": "Un grupo de trabajo."}, {"enunciado": "De las afirmaciones que se hacen, señala la que no es una ventaja del trabajo en equipo:", "opciones": {"A": "Favorece la resolución conjunta de conflictos.", "B": "Diferente implicación o rendimiento de los componentes del equipo.", "C": "Aumenta la responsabilidad y la confianza entre los miembros.", "D": "Agrupa diversas formas de pensar y trabajar."}, "correcta": "Diferente implicación o rendimiento de los componentes del equipo."}, {"enunciado": "De las siguientes características, ¿cuál se puede atribuir a los equipos de trabajo?:", "opciones": {"A": "Todos tienen las mismas habilidades.", "B": "Existe una meta común y consensuada.", "C": "La estructura jerárquica es rígida.", "D": "Todas son correctas."}, "correcta": "Existe una meta común y consensuada."}, {"enunciado": "La capacidad que tiene el emisor del mensaje para detectar las reacciones del receptor y adaptar sus siguientes mensajes, en caso de que fuera necesario, ¿a qué hace referencia?", "opciones": {"A": "Feedback.", "B": "Asertividad.", "C": "Performing.", "D": "Inteligencia emocional."}, "correcta": "Feedback."}, {"enunciado": "La habilidad para entender y gestionar los sentimientos propios y ajenos cuando se interactúa con otras personas se conoce como:", "opciones": {"A": "Feedback.", "B": "Asertividad.", "C": "Performing.", "D": "Inteligencia emocional."}, "correcta": "Inteligencia emocional."}, {"enunciado": "Las habilidades, experiencias y conocimientos de cada individuo, necesarios para que desempeñe una función dentro del equipo, se denominan:", "opciones": {"A": "Rol de equipo.", "B": "Rol funcional.", "C": "Rol transformacional.", "D": "Rol aplicativo."}, "correcta": "Rol funcional."}, {"enunciado": "Señala la dinámica de trabajo en equipo en la que cada uno de los miembros del equipo expone con la mayor libertad sus ideas sobre un tema o problema, sin que ninguna se descarte o se critique:", "opciones": {"A": "Forming.", "B": "Role-Playing.", "C": "Hate-storming.", "D": "Tormenta de ideas."}, "correcta": "Tormenta de ideas."}, {"enunciado": "Si el coordinador divide el grupo en subgrupos de seis personas y les da seis minutos para que discutan un problema y aporten soluciones, estamos ante la dinámica de trabajo en equipo de:", "opciones": {"A": "Seis sombreros para pensar.", "B": "Role-Playing de los seis minutos.", "C": "Phillips 6/6.", "D": "Quentin 6-6-6"}, "correcta": "Phillips 6/6."}, {"enunciado": "Uno de los sistemas más utilizados para expresar deseos u opiniones desde la asertividad es el:", "opciones": {"A": "DESC (describir, expresar, sugerir, consecuencias).", "B": "PEST (proponer, explicar, separar, terminar).", "C": "SEND (sugerir, enviar, naturalizar, digerir).", "D": "CESC (canalizar, escuchar, solicitar, consensuar)."}, "correcta": "DESC (describir, expresar, sugerir, consecuencias)."}]}, {"tema": 3, "preguntas": [{"enunciado": "Cuando en un conflicto se involucra a un tercero imparcial que interviene activamente, propone soluciones y facilita que las partes lleguen a un acuerdo beneficioso para ambas, se habla de:", "opciones": {"A": "Negociación.", "B": "Arbitraje.", "C": "Mediación.", "D": "Conciliación."}, "correcta": "Conciliación."}, {"enunciado": "Cuando las partes afectadas en un conflicto acuerdan que un tercero objetivo e imparcial decida la solución, estando representado este por una institución con autoridad para exigir el cumplimiento de su decisión, se trata de:", "opciones": {"A": "Negociación.", "B": "Arbitraje.", "C": "Mediación.", "D": "Conciliación."}, "correcta": "Arbitraje."}, {"enunciado": "Cuando se acude a un tercero que, aunque no interviene activamente en la búsqueda de alternativas, se encarga de ayudar y animar a las partes a llegar a un acuerdo, facilitando la comunicación, estamos ante:", "opciones": {"A": "Negociación.", "B": "Arbitraje.", "C": "Mediación.", "D": "Conciliación."}, "correcta": "Mediación."}, {"enunciado": "De las siguientes características, señala cuál no pertenece al conflicto:", "opciones": {"A": "Es inherente a los grupos.", "B": "Siempre se puede considerar como un obstáculo que impide alcanzar los objetivos.", "C": "Si se maneja adecuadamente pueden obtenerse consecuencias positivas de él.", "D": "Existe un predominio de las opiniones opuestas."}, "correcta": "Siempre se puede considerar como un obstáculo que impide alcanzar los objetivos."}, {"enunciado": "En la fase inicial del conflicto:", "opciones": {"A": "Se debe negar o ignorar el conflicto para que desaparezca.", "B": "Se detecta una perturbación originada por una situación problemática latente.", "C": "Se interviene rápidamente.", "D": "Ya se ha decidido el abordaje y la resolución del conflicto."}, "correcta": "Se detecta una perturbación originada por una situación problemática latente."}, {"enunciado": "En relación con los costes que se asocian a los conflictos:", "opciones": {"A": "Los costes de oportunidad provocan daños emocionales.", "B": "En ningún caso se producen costes monetarios.", "C": "En ocasiones el coste es la pérdida de personal.", "D": "Siempre se asocian costes legales."}, "correcta": "En ocasiones el coste es la pérdida de personal."}, {"enunciado": "Los conflictos de relación:", "opciones": {"A": "Son fruto de la carencia de información.", "B": "Surgen cuando alguien intenta imponer sus valores.", "C": "Se originan por mala comunicación y conductas desfavorables.", "D": "Están configurados por personas que no están involucradas en el conflicto."}, "correcta": "Se originan por mala comunicación y conductas desfavorables."}, {"enunciado": "Para que exista una negociación debe haber:", "opciones": {"A": "Un equilibrio de fuerzas entre las partes.", "B": "Capacidad de comunicación entre las partes.", "C": "Intención de llegar a un entendimiento.", "D": "Todas son correctas."}, "correcta": "Todas son correctas."}, {"enunciado": "Proceso en el que los involucrados en un conflicto mantienen un diálogo para resolver sus diferencias, hasta alcanzar una solución de mutuo acuerdo:", "opciones": {"A": "Negociación.", "B": "Confrontación.", "C": "Mediación.", "D": "Conciliación."}, "correcta": "Negociación."}, {"enunciado": "Señala cuál de las siguientes no es una característica del buen negociador:", "opciones": {"A": "Es inflexible e impone su negativa a ciertas situaciones.", "B": "Tiene un profundo conocimiento del tema.", "C": "Observa con atención y tiene en cuenta los pequeños detalles.", "D": "Es resolutivo y capaz de afrontar un punto de bloqueo."}, "correcta": "Es inflexible e impone su negativa a ciertas situaciones."}]}, {"tema": 4, "preguntas": [{"enunciado": "Con respecto a los contratos de formación en alternancia:", "opciones": {"A": "Su finalidad es cubrir temporalmente un puesto de trabajo durante el proceso de selección formativa.", "B": "La duración mínima será de tres meses y la máxima de dos años.", "C": "Admite la realización de horas extra en un 65% de las jornadas, durante el primer año.", "D": "Todas son correctas."}, "correcta": "La duración mínima será de tres meses y la máxima de dos años."}, {"enunciado": "Dentro del derecho comunitario diferenciamos entre:", "opciones": {"A": "La OIT y el ET.", "B": "El derecho interno y el derecho externo.", "C": "El derecho originario y el derecho derivado.", "D": "Las directivas, las recomendaciones, las sanciones y las euroórdenes."}, "correcta": "El derecho originario y el derecho derivado."}, {"enunciado": "Durante el período de prueba:", "opciones": {"A": "El empresario puede despedir sin justificación ni indemnización, pero el trabajador, en caso de querer abandonar la empresa, sí debe dar preaviso.", "B": "El empresario no puede despedir sin justificación.", "C": "El empresario puede despedir sin justificación ni indemnización y el trabajador, en caso de querer abandonar la empresa, no debe dar preaviso.", "D": "En la actualidad ya no existe el período de prueba."}, "correcta": "El empresario puede despedir sin justificación ni indemnización y el trabajador, en caso de querer abandonar la empresa, no debe dar preaviso."}, {"enunciado": "El orden jerárquico correcto de las normas (de mayor a menor) es:", "opciones": {"A": "La Constitución, las leyes y normas con rango de ley, reglamentos, convenio colectivo, contrato de trabajo, usos y costumbres locales y profesionales.", "B": "La Constitución, convenio colectivo, contrato de trabajo, usos y costumbres locales y profesionales, normas con rango de ley y reglamentos.", "C": "Las leyes y normas con rango de ley, la constitución, contrato de trabajo, reglamentos, convenio colectivo, usos y costumbres locales y profesionales.", "D": "Ninguna es correcta."}, "correcta": "La Constitución, las leyes y normas con rango de ley, reglamentos, convenio colectivo, contrato de trabajo, usos y costumbres locales y profesionales."}, {"enunciado": "El periodo de prueba en un contrato:", "opciones": {"A": "Puede llegar a tener una duración de 6 meses para los técnicos titulados y 2 meses para el resto.", "B": "Puede llegar a tener una duración de 12 meses para los técnicos titulados y 8 meses para el resto.", "C": "Su establecimiento es obligatorio y debe aparecer por escrito en el contrato.", "D": "En la actualidad ya no existe el periodo de prueba."}, "correcta": "Puede llegar a tener una duración de 6 meses para los técnicos titulados y 2 meses para el resto."}, {"enunciado": "El principio in dubio pro operario:", "opciones": {"A": "Es una interpretación de la norma, indica que en caso de confusión se aplicará la norma que favorezca al empresario.", "B": "Es una expresión proveniente del latín en la que se enaltece el trabajo duro.", "C": "Es una interpretación de la norma, indica que en caso de confusión se aplicará la norma que favorezca al trabajador.", "D": "Es una interpretación de la norma, indica que en los trabajadores no pueden renunciar a los derechos que les otorgan las normas."}, "correcta": "Es una interpretación de la norma, indica que en caso de confusión se aplicará la norma que favorezca al trabajador."}, {"enunciado": "En la relación laboral entre empleador y empleado, las normas abogan por:", "opciones": {"A": "Proteger por igual a empleador y empleado.", "B": "Proteger en mayor medida al empleado.", "C": "Proteger en mayor medida al empleador.", "D": "Solo establecen recomendaciones a seguir."}, "correcta": "Proteger en mayor medida al empleado."}, {"enunciado": "Señala cuál de las siguientes es una relación laboral ordinaria:", "opciones": {"A": "Funcionario público.", "B": "Consejero de una sociedad.", "C": "Autónomo.", "D": "Operario de fábrica."}, "correcta": "Operario de fábrica."}, {"enunciado": "Señala la afirmación falsa acerca del derecho laboral:", "opciones": {"A": "Ha existido desde que existe el trabajo.", "B": "Nace en el siglo XIX derivado de los problemas de la revolución industrial.", "C": "Está en continuo cambio e intenta mejorar la calidad y el bienestar en el ámbito laboral.", "D": "Sus principios sirven para interpretar la legislación laboral y cubrir los vacíos que deje."}, "correcta": "Ha existido desde que existe el trabajo."}, {"enunciado": "Señala la respuesta correcta:", "opciones": {"A": "Si se tiene un contrato a tiempo parcial no se pueden realizar horas extras, salvo por fuerza mayor.", "B": "La duración máxima de un contrato indefinido es de 25 años.", "C": "El contrato de trabajo temporal solo puede celebrarse a jornada parcial, aunque de manera verbal o escrita.", "D": "Ninguna es correcta."}, "correcta": "Si se tiene un contrato a tiempo parcial no se pueden realizar horas extras, salvo por fuerza mayor."}]}, {"tema": 5, "preguntas": [{"enunciado": "¿Qué se entiende por salario?", "opciones": {"A": "Totalidad de las percepciones económicas del trabajador, en dinero o en especie.", "B": "Totalidad de las percepciones económicas del trabajador en dinero.", "C": "Recibo individual que justifique el pago, con el formato del Ministerio de Trabajo.", "D": "Es el devengo no consolidable a nivel fiscal."}, "correcta": "Totalidad de las percepciones económicas del trabajador, en dinero o en especie."}, {"enunciado": "¿Qué situación no se considera una modificación sustancial de las condiciones de trabajo?", "opciones": {"A": "Aquella que afecte a la jornada de trabajo.", "B": "Cambio a turnos rotativos.", "C": "Modificación del espacio de trabajo dentro del mismo centro.", "D": "Modificación de la cuantía del salario o del sistema de remuneración."}, "correcta": "Modificación del espacio de trabajo dentro del mismo centro."}, {"enunciado": "El FOGASA:", "opciones": {"A": "Se encarga de proteger la percepción de los salarios que estén pendientes de pago.", "B": "Se encarga de proteger las indemnizaciones por despido o extinción que estén reconocidas por vía judicial o administrativa.", "C": "Es un organismo autónomo adscrito al Ministerio de Trabajo.", "D": "Todas son correctas."}, "correcta": "Todas son correctas."}, {"enunciado": "El Salario Mínimo Interprofesional (SMI):", "opciones": {"A": "Es la cuantía mínima percibida por un trabajo por cuenta ajena a tiempo completo.", "B": "No se puede mejorar por contrato salvo que lo autorice el Gobierno por ley.", "C": "Se usa como referencia para el IPC.", "D": "Ninguna de las anteriores es correcta."}, "correcta": "Es la cuantía mínima percibida por un trabajo por cuenta ajena a tiempo completo."}, {"enunciado": "En un despido colectivo:", "opciones": {"A": "Deben concurrir causas económicas, técnicas, organizativas o de producción.", "B": "En general, debe afectar al 30% de la plantilla.", "C": "No requiere comunicación previa a los representantes de los trabajadores.", "D": "A y B son correctas."}, "correcta": "Deben concurrir causas económicas, técnicas, organizativas o de producción."}, {"enunciado": "En un despido declarado improcedente:", "opciones": {"A": "Se prohíbe readmitir al trabajador.", "B": "Se entrega un finiquito de hasta 24 mensualidades.", "C": "El empresario siempre debe pagar una indemnización de 24 días por año trabajado.", "D": "Ninguna es correcta."}, "correcta": "Ninguna es correcta."}, {"enunciado": "En un despido disciplinario:", "opciones": {"A": "Te deben indemnizar con 20 días de salario por año trabajado.", "B": "Te deben indemnizar con 33 días de salario por año trabajado.", "C": "Se cobrará indemnización solo si el empresario no preavisa con 30 días.", "D": "No tienes derecho a indemnización."}, "correcta": "No tienes derecho a indemnización."}, {"enunciado": "Indica cuál de los siguientes conceptos se considera una deducción a efectos de retribución:", "opciones": {"A": "Indemnizaciones o suplidos.", "B": "Cotización por desempleo.", "C": "Retención por IRPF.", "D": "B y C son correctas."}, "correcta": "B y C son correctas."}, {"enunciado": "Indica cuál de los siguientes no es considerado un complemento salarial:", "opciones": {"A": "Nocturnidad.", "B": "Toxicidad o peligrosidad.", "C": "Quebranto de moneda.", "D": "Participación en los resultados de la empresa."}, "correcta": "Quebranto de moneda."}, {"enunciado": "Se considera una causa de despido objetivo:", "opciones": {"A": "Embriaguez habitual o toxicomanía.", "B": "Ofensas verbales o físicas a otros trabajadores.", "C": "Disminución continuada y voluntaria en el rendimiento de trabajo.", "D": "Ineptitud del trabajador conocida o sobrevenida posteriormente."}, "correcta": "Ineptitud del trabajador conocida o sobrevenida posteriormente."}]}, {"tema": 6, "preguntas": [{"enunciado": "¿Cuál de las siguientes no es una garantía de los representantes de los trabajadores?", "opciones": {"A": "Prioridad de permanencia.", "B": "Libertad de expresión en asuntos relacionados a su representación.", "C": "Están exentos de los despidos disciplinarios.", "D": "Se les concederá un número de horas al mes retribuidas para ejercer sus funciones como representante."}, "correcta": "Están exentos de los despidos disciplinarios."}, {"enunciado": "¿Cuál de los siguientes días debe respetarse por fiesta nacional?", "opciones": {"A": "1 de enero.", "B": "1 de mayo.", "C": "12 de octubre.", "D": "Todos los anteriores."}, "correcta": "Todos los anteriores."}, {"enunciado": "¿Cuál es una competencia del comité de empresa?", "opciones": {"A": "Vigilancia en el cumplimiento de las normas laborales, de seguridad laboral y de empleo.", "B": "Participar en la gestión de obras sociales en beneficio de los trabajadores y sus familiares.", "C": "Informar a sus representados de los temas y asuntos que repercutan en las relaciones laborales.", "D": "Todas las anteriores."}, "correcta": "Todas las anteriores."}, {"enunciado": "Cuando de entre los trabajadores se escoge un delegado de personal, se está ejerciendo el derecho a:", "opciones": {"A": "Representación colectiva unitaria.", "B": "Representación colectiva sindical.", "C": "Representación retribuida personalizada.", "D": "Ninguna de las anteriores."}, "correcta": "Representación colectiva unitaria."}, {"enunciado": "El cese de la prestación de trabajo por parte de los trabajadores para reivindicar algún conflicto o la mejora de condiciones laborales se conoce como:", "opciones": {"A": "Huelga.", "B": "Cierre patronal.", "C": "Conflicto colectivo.", "D": "Festivos."}, "correcta": "Huelga."}, {"enunciado": "El convenio colectivo:", "opciones": {"A": "Es una de las fuentes del derecho laboral.", "B": "Es un pacto alcanzado libremente.", "C": "Es el reflejo de la participación efectiva de los trabajadores.", "D": "Todas son correctas."}, "correcta": "Todas son correctas."}, {"enunciado": "El trabajo nocturno:", "opciones": {"A": "Permite la realización de 15 horas extraordinarias semanales.", "B": "Se retribuye con una cuantía menor si ocurre por fuerza mayor.", "C": "Debe darse al menos durante 3 horas o 1/3 de la jornada de 22:00 a 6:00.", "D": "Debe darse al menos durante 5 horas o 3/5 de la jornada de 00:00 a 8:00."}, "correcta": "Debe darse al menos durante 3 horas o 1/3 de la jornada de 22:00 a 6:00."}, {"enunciado": "La jornada laboral:", "opciones": {"A": "Establece el número de horas diarias a realizar por el trabajador.", "B": "Establece el número de horas semanales a realizar por el trabajador.", "C": "Establece el número de horas anuales a realizar por el trabajador.", "D": "Todas son correctas."}, "correcta": "Todas son correctas."}, {"enunciado": "Las vacaciones:", "opciones": {"A": "No son un derecho constitucional.", "B": "Sirven para dar descanso a los trabajadores.", "C": "Pueden ser o no retribuidas.", "D": "Pueden sustituirse por una compensación económica."}, "correcta": "Sirven para dar descanso a los trabajadores."}, {"enunciado": "Quitando las excepciones, ¿Cuánto tiempo mínimo debe transcurrir entre el final de una jornada y el comienzo de otra?", "opciones": {"A": "8 horas.", "B": "12 horas.", "C": "6 horas.", "D": "No existe un tiempo mínimo, depende del cómputo semanal."}, "correcta": "12 horas."}]}, {"tema": 7, "preguntas": [{"enunciado": "Cuál de las siguientes situaciones no es una acción protectora de la Seguridad Social:", "opciones": {"A": "Incapacidad temporal.", "B": "Asistencia sanitaria.", "C": "Jubilación.", "D": "Prestación por circunstancia social."}, "correcta": "Prestación por circunstancia social."}, {"enunciado": "La diferencia entre incapacidad permanente y lesión permanente no invalidante es:", "opciones": {"A": "La lesión permanente no invalidante es un tipo de incapacidad permanente total, que solo inhabilita para la profesión habitual.", "B": "La lesión permanente no invalidante no repercute sobre la capacidad laboral, a diferencia de la incapacidad permanente.", "C": "No existe el término de lesión permanente no invalidante.", "D": "Ninguna respuesta es correcta."}, "correcta": "La lesión permanente no invalidante no repercute sobre la capacidad laboral, a diferencia de la incapacidad permanente."}, {"enunciado": "La diferencia entre las prestaciones contributivas y las no contributivas es:", "opciones": {"A": "Cada una va en función del tipo de incapacidad que se sufra.", "B": "La contributiva es dependiente del tiempo que se vaya a percibir la prestación, al contrario que la no contributiva.", "C": "La contributiva va destinada a quienes hayan cotizado lo suficiente y la no contributiva a personas sin recursos o que no hayan cotizado lo suficiente.", "D": "Ninguna de las anteriores es correcta."}, "correcta": "La contributiva va destinada a quienes hayan cotizado lo suficiente y la no contributiva a personas sin recursos o que no hayan cotizado lo suficiente."}, {"enunciado": "La gestora encargada de las prestaciones por desempleo, el análisis del mercado de trabajo y el registro público de ofertas, demandas y contratos es:", "opciones": {"A": "Instituto Nacional de la Seguridad Social.", "B": "Servicio Público de Empleo Estatal.", "C": "Tesorería General de la Seguridad Social.", "D": "Instituto de Mayores y Servicios Sociales."}, "correcta": "Servicio Público de Empleo Estatal."}, {"enunciado": "La gestora que se encarga de realizar la gestión económica, financiera y patrimonial del sistema de Seguridad Social es:", "opciones": {"A": "Tesorería General de la Seguridad Social.", "B": "Instituto Nacional de la Seguridad Social.", "C": "Servicio Público de Empleo Estatal.", "D": "Instituto de Mayores y Servicios Sociales."}, "correcta": "Tesorería General de la Seguridad Social."}, {"enunciado": "Las prestaciones que conforman la acción protectora de la Seguridad Social se pueden clasificar en:", "opciones": {"A": "Familiares e individuales.", "B": "Personales y laborales.", "C": "Contributivas y no contributivas.", "D": "Asistenciales y no asistenciales."}, "correcta": "Contributivas y no contributivas."}, {"enunciado": "Los grados de incapacidad permanente son:", "opciones": {"A": "Parcial, total, absoluta y gran invalidez.", "B": "Crónica y total.", "C": "Concluyente, lesiva y gran invalidez.", "D": "Revisable, incapacitante, parcial y absoluta."}, "correcta": "Parcial, total, absoluta y gran invalidez."}, {"enunciado": "Los requisitos para percibir el subsidio por desempleo son:", "opciones": {"A": "Solamente no disponer de ningún tipo de renta mensual.", "B": "No rechazar ofertas de empleo adecuadas ni acciones formativas y carecer de rentas mensuales superiores al 75% del SMI.", "C": "Estar en situación de desempleo, ser menor de 55 años e ingresar menos del 80 % del IPREM.", "D": "Estar en situación de desempleo, tener alguna incapacidad y/o cargas familiares."}, "correcta": "No rechazar ofertas de empleo adecuadas ni acciones formativas y carecer de rentas mensuales superiores al 75% del SMI."}, {"enunciado": "Qué situación no se considera situación de desempleo:", "opciones": {"A": "Abandono del puesto de trabajo.", "B": "Extinción o suspensión autorizada de la relación laboral.", "C": "Liberación de prisión por cumplir condena o puesta en libertad condicional.", "D": "Todas las situaciones anteriores son situaciones de desempleo."}, "correcta": "Abandono del puesto de trabajo."}, {"enunciado": "Señala la respuesta correcta respecto a la incapacidad temporal:", "opciones": {"A": "Se produce cuando un trabajador está imposibilitado durante cierto periodo de tiempo para trabajar y necesita asistencia sanitaria.", "B": "Tanto en las enfermedades comunes como en las profesionales, es obligatorio tener cotizados 180 días en el año inmediatamente anterior.", "C": "Su duración máxima es de 360 días improrrogables.", "D": "Todas son correctas."}, "correcta": "Se produce cuando un trabajador está imposibilitado durante cierto periodo de tiempo para trabajar y necesita asistencia sanitaria."}]}, {"tema": 8, "preguntas": [{"enunciado": "¿Cuál de los siguientes no es uno de los principios de la acción preventiva recogidos en el artículo 15 de la Ley de Prevención de Riesgos Laborales?:", "opciones": {"A": "Combatir los riesgos en su origen.", "B": "Obligatoriedad de contratación de un servicio de prevención externo.", "C": "Tener en cuenta la evolución de la técnica.", "D": "Adoptar medidas que antepongan la protección colectiva a la individual."}, "correcta": "Obligatoriedad de contratación de un servicio de prevención externo."}, {"enunciado": "¿Qué son las condiciones de trabajo?:", "opciones": {"A": "Las características generales de las instalaciones y equipos.", "B": "Los elementos integrados en los principios generales de la acción preventiva.", "C": "Cualquier particularidad laboral que pueda generar riesgos para la seguridad y la salud del trabajador.", "D": "Las responsabilidades que asume cada una de las partes implicadas en la actividad laboral."}, "correcta": "Cualquier particularidad laboral que pueda generar riesgos para la seguridad y la salud del trabajador."}, {"enunciado": "Cuando hablamos de salud, hacemos referencia a:", "opciones": {"A": "La salud real, percibida y asociada.", "B": "La salud física, social y psíquica.", "C": "La salud personal, laboral e interpersonal.", "D": "La salud interior, exterior y contextual."}, "correcta": "La salud física, social y psíquica."}, {"enunciado": "Cuando se habla de \"combatir los riesgos en su origen\" se hace referencia a:", "opciones": {"A": "Localizar a los trabajadores que no cumplen la LPRL.", "B": "Evaluar los riesgos que no pueden eliminarse.", "C": "No actuar en el lugar de transmisión o recepción, sino en el foco.", "D": "Todas son correctas."}, "correcta": "No actuar en el lugar de transmisión o recepción, sino en el foco."}, {"enunciado": "Dentro de la organización del trabajo, la carga de trabajo incluye:", "opciones": {"A": "Exigencias físicas y mentales.", "B": "Exigencias directas e indirectas.", "C": "Elementos tangibles, intangibles y neutrales del puesto.", "D": "Las responsabilidades asumidas con respecto a los medios y actividades."}, "correcta": "Exigencias físicas y mentales."}, {"enunciado": "En materia de prevención y riesgos laborales, la empresa tiene unos deberes:", "opciones": {"A": "Generales, con respecto a los trabajadores y con respecto al centro de trabajo.", "B": "Directos, indirectos y asociados a su actividad.", "C": "Con respecto a los trabajadores, con respecto a su actividad y con respecto a sus públicos.", "D": "Principales, secundarios y relacionados con sus bienes y servicios."}, "correcta": "Generales, con respecto a los trabajadores y con respecto al centro de trabajo."}, {"enunciado": "La enfermedad profesional:", "opciones": {"A": "Debe estar recogida en el listado de la Directiva Marco.", "B": "Se define como toda lesión corporal que sufre el trabajador por cuenta ajena como consecuencia del trabajo.", "C": "Incluye las que sean por dolo o imprudencia temeraria del trabajador.", "D": "Ninguna es correcta."}, "correcta": "Ninguna es correcta."}, {"enunciado": "Las dimensiones del burnout son:", "opciones": {"A": "El agotamiento emocional, la despersonalización y la baja realización personal.", "B": "La manifestación general, la manifestación local y la intensidad.", "C": "El desinterés, la agresividad y el bajo rendimiento.", "D": "La baja atención, el aumento de los conflictos laborales y la irascibilidad."}, "correcta": "El agotamiento emocional, la despersonalización y la baja realización personal."}, {"enunciado": "Los síntomas del estrés incluyen:", "opciones": {"A": "Síntomas perceptibles, síntomas imperceptibles y síntomas difusos.", "B": "Síntomas laborales, síntomas sociales, síntomas interpersonales y síntomas empresariales.", "C": "Síntomas físicos, síntomas psicológicos, síntomas para la empresa y síntomas para el trabajador.", "D": "Ninguna es correcta."}, "correcta": "Síntomas físicos, síntomas psicológicos, síntomas para la empresa y síntomas para el trabajador."}, {"enunciado": "Tanto el empresario como los trabajadores tienen una responsabilidad:", "opciones": {"A": "Administrativa, civil y penal.", "B": "Directa, indirecta y asociada.", "C": "Criminal, procesal y judicial.", "D": "Laboral, administrativa y social."}, "correcta": "Administrativa, civil y penal."}]}, {"tema": 9, "preguntas": [{"enunciado": "Aquellos agentes que, al entrar en contacto con tejidos vivos los pueden destruir se denominan:", "opciones": {"A": "Irritantes.", "B": "Corrosivos.", "C": "Inflamables.", "D": "Tóxicos."}, "correcta": "Corrosivos."}, {"enunciado": "Aquellos agentes que, por inhalación, ingestión o penetración cutánea, pueden provocar efectos agudos o crónicos e incluso la muerte se denominan:", "opciones": {"A": "Irritantes.", "B": "Corrosivos.", "C": "Inflamables.", "D": "Tóxicos."}, "correcta": "Tóxicos."}, {"enunciado": "Determina si el tono es agudo o grave y se mide en hercios (Hz):", "opciones": {"A": "Frecuencia.", "B": "Duración.", "C": "Intensidad.", "D": "Volumen."}, "correcta": "Frecuencia."}, {"enunciado": "El factor que permite que el ruido pueda ser continuo, discontinuo o de impacto, se denomina:", "opciones": {"A": "Frecuencia.", "B": "Duración.", "C": "Intensidad.", "D": "Volumen."}, "correcta": "Duración."}, {"enunciado": "El instrumento de medida utilizado para medir la cantidad de luz es el:", "opciones": {"A": "Lumen.", "B": "Lux.", "C": "Luxómetro.", "D": "Lumenógeno."}, "correcta": "Luxómetro."}, {"enunciado": "Es la unidad con la que se mide la cantidad de luz que puede emitir una fuente luminosa:", "opciones": {"A": "Lumen.", "B": "Lux.", "C": "Luthor.", "D": "Lule."}, "correcta": "Lumen."}, {"enunciado": "La iluminación producida por 1 lumen en 1 m² de superficie se mide en:", "opciones": {"A": "Lumen.", "B": "Lux.", "C": "Luthor.", "D": "Lule."}, "correcta": "Lux."}, {"enunciado": "Sustancias y preparados no corrosivos que, en contacto breve, prolongado o repetido con la piel o las mucosas, pueden provocar una reacción inflamatoria se denominan:", "opciones": {"A": "Irritantes.", "B": "Estimulantes.", "C": "Inflamables.", "D": "Tóxicos."}, "correcta": "Irritantes."}, {"enunciado": "Sustancias y preparados que por inhalación, ingestión o penetración cutánea puedan producir cáncer o aumento de su frecuencia se denominan:", "opciones": {"A": "Intoxicantes.", "B": "Enfermantes.", "C": "Carcinógenos.", "D": "Mutagénicos."}, "correcta": "Carcinógenos."}, {"enunciado": "Sustancias y preparados que por inhalación, ingestión o penetración cutánea puedan producir alteraciones en el material genético de las células se denominan:", "opciones": {"A": "Intoxicantes.", "B": "Sensibilizantes.", "C": "Carcinógenos.", "D": "Mutagénicos."}, "correcta": "Mutagénicos."}]}, {"tema": 10, "preguntas": [{"enunciado": "Aquella técnica que trata de evitar los posibles daños psicológicos que puedan afectar a los trabajadores, derivados del trabajo y de la organización de este, es la que se conoce como:", "opciones": {"A": "Ergonomía.", "B": "Psicología de daños.", "C": "Psicología aplicada.", "D": "Psicología analítica."}, "correcta": "Psicología aplicada."}, {"enunciado": "En relación con las medidas de protección:", "opciones": {"A": "Debe primar la seguridad individual sobre la colectiva.", "B": "Debe primar la seguridad colectiva sobre la individual.", "C": "Se centran en el uso de señalización de seguridad.", "D": "Son lo mismo que las técnicas de prevención."}, "correcta": "Debe primar la seguridad colectiva sobre la individual."}, {"enunciado": "Entre las señales auditivas podemos encontrar:", "opciones": {"A": "Señales acústicas y señales táctiles.", "B": "Señales acústicas y comunicación verbal.", "C": "Señales verbales y señales sensoriales.", "D": "Señales acústicas y señales operativas."}, "correcta": "Señales acústicas y comunicación verbal."}, {"enunciado": "Entre los principios generales que se encuentran establecidos en el artículo 15 de la LPRL, encontramos:", "opciones": {"A": "Evitar los riesgos.", "B": "Combatir los riesgos en su origen.", "C": "Tener en cuenta la evolución de la técnica.", "D": "Todas las respuestas son correctas."}, "correcta": "Todas las respuestas son correctas."}, {"enunciado": "La finalidad de la prevención es:", "opciones": {"A": "Elaborar un listado de medidas y técnicas de seguridad.", "B": "Dar las debidas instrucciones a los trabajadores, explicándoles los posibles peligros y riesgos de su puesto de trabajo, así como del uso de maquinaria y equipos de protección.", "C": "Estudiar el puesto de trabajo que conlleve riesgos múltiples y requiera de la utilización de varios EPI de forma simultánea para asegurarse de su compatibilidad.", "D": "Evitar, en la medida de lo posible, todos aquellos riesgos que puedan surgir dentro de la empresa, detectándolos en su origen y valorando su probabilidad y gravedad."}, "correcta": "Evitar, en la medida de lo posible, todos aquellos riesgos que puedan surgir dentro de la empresa, detectándolos en su origen y valorando su probabilidad y gravedad."}, {"enunciado": "La Ley de Prevención de Riesgos Laborales es:", "opciones": {"A": "Ley 31/1995, de 8 de noviembre de Prevención de Riesgos Laborales.", "B": "Ley 41/1985, de 7 de noviembre de Prevención de Riesgos Laborales.", "C": "Ley 31/2005, de 28 de diciembre de Prevención de Riesgos Laborales.", "D": "Ley 51/2015, de 18 de diciembre de Prevención de Riesgos Laborales."}, "correcta": "Ley 31/1995, de 8 de noviembre de Prevención de Riesgos Laborales."}, {"enunciado": "La señalización de seguridad:", "opciones": {"A": "Establece las condiciones relativas al tamaño del puesto de trabajo, es decir, las distancias y dimensiones óptimas.", "B": "Requiere, para un correcto almacenamiento, mantenimiento y reparación, seguir las instrucciones facilitadas por el fabricante.", "C": "Siempre incluye un pictograma que facilita la interpretación de su significado.", "D": "Nos da una indicación u obligación dependiendo del caso concreto, en relación con la seguridad o la salud en el puesto de trabajo."}, "correcta": "Nos da una indicación u obligación dependiendo del caso concreto, en relación con la seguridad o la salud en el puesto de trabajo."}, {"enunciado": "Señala la afirmación correcta:", "opciones": {"A": "La señalización de seguridad antepone las advertencias sobre el buen uso de maquinaria y equipos de protección.", "B": "La señalización de seguridad no exime al empresario de la obligación de informar y formar a sus trabajadores en materia de salud y seguridad.", "C": "La señalización de seguridad no suele ir acompañada de otras medidas de protección y seguridad.", "D": "La señalización de seguridad elimina totalmente el riesgo."}, "correcta": "La señalización de seguridad no exime al empresario de la obligación de informar y formar a sus trabajadores en materia de salud y seguridad."}, {"enunciado": "Con respecto a las formas de las señales de seguridad:", "opciones": {"A": "Si la forma es redonda se trata de señales de obligación o prohibición.", "B": "Si la forma es triangular se trata de señales de advertencia.", "C": "Si la forma es rectangular o cuadrada, se puede tratar de lucha contra incendios, peligro o alarma.", "D": "Todas las respuestas son correctas."}, "correcta": "Todas las respuestas son correctas."}, {"enunciado": "Todo aquel equipo que el trabajador lleva puesto o sujeto a él mismo para que le proteja de uno o varios riesgos que amenacen su seguridad o su salud, además de cualquier complemento o accesorio que cumpla esa misma función, se denomina:", "opciones": {"A": "Equipo de Prevención Interna.", "B": "Equipo de Protección Colectivo.", "C": "Equipo de Protección Individual.", "D": "Equipo de Protección Ergonómico."}, "correcta": "Equipo de Protección Individual."}]}, {"tema": 11, "preguntas": [{"enunciado": "A la hora de llevar a cabo la evaluación de riesgos, es necesario realizar un análisis sistemático de todos los aspectos que integran la actividad laboral, teniendo en cuenta:", "opciones": {"A": "La naturaleza de la actividad de la empresa.", "B": "El número de los trabajadores expuestos y sus características.", "C": "Las preferencias del empresario.", "D": "Las respuestas a y b son correctas."}, "correcta": "Las respuestas a y b son correctas."}, {"enunciado": "Cuando se realiza la evaluación de riesgos, se suceden dos fases:", "opciones": {"A": "La descripción del riesgo y su comunicación al INSSBT.", "B": "El análisis del riesgo y su valoración.", "C": "La aparición del riesgo y su acotación.", "D": "La detección del riesgo y su eliminación."}, "correcta": "El análisis del riesgo y su valoración."}, {"enunciado": "El análisis de riesgos se compone de varias fases, que son:", "opciones": {"A": "Medición del riesgo, cálculo de probabilidades y extrapolación del riesgo.", "B": "Identificación de la exposición, análisis del peligro y evaluación de medidas.", "C": "Identificación del peligro, descripción del riesgo y estimación del riesgo.", "D": "Acción, reacción y comunicación."}, "correcta": "Identificación del peligro, descripción del riesgo y estimación del riesgo."}, {"enunciado": "El proceso dirigido a estimar la magnitud de aquellos riesgos que no hayan podido evitarse, obteniendo la información necesaria para que el empresario esté en condiciones de tomar una decisión apropiada sobre la necesidad de adoptar medidas preventivas y, en tal caso, sobre el tipo de medidas que deben adoptarse, se denomina:", "opciones": {"A": "Evaluación de los riesgos laborales.", "B": "Reglamento de los Servicios de Prevención.", "C": "Planificación de Autoprotección.", "D": "Ninguna es correcta."}, "correcta": "Evaluación de los riesgos laborales."}, {"enunciado": "La evaluación de riesgos:", "opciones": {"A": "Se debe realizar al inicio de la actividad empresarial.", "B": "Debe ser revisada y actualizada de forma periódica.", "C": "Exige evaluaciones concretas en determinadas circunstancias, como nuevas incorporaciones.", "D": "Todas las respuestas son correctas."}, "correcta": "Todas las respuestas son correctas."}, {"enunciado": "Las fases de evacuación son:", "opciones": {"A": "Detección de la emergencia, alerta, evacuación, desalojo y finalización.", "B": "Detección de la emergencia, control del pánico, escape y reunión.", "C": "Detección de la emergencia, reflexión, comprobación y cálculo de los tiempos.", "D": "Detección de la emergencia, acciones preventivas, alarma y resolución."}, "correcta": "Detección de la emergencia, alerta, evacuación, desalojo y finalización."}, {"enunciado": "Para la buena gestión de un sistema preventivo son básicos los siguientes elementos:", "opciones": {"A": "Política de prevención, organización de la prevención, evaluación de riesgos, planificación de la actividad preventiva, ejecución y auditoría.", "B": "Política de evaluación, política de riesgos, planificación de la actividad preventiva, subsanación y retroalimentación.", "C": "Auditoría externa, auditoría interna, coordinación de emergencias, evaluación de las actuaciones y reorientación preventiva.", "D": "Identificación del peligro, descripción del riesgo, determinación de la severidad de sus consecuencias, acción y temporización."}, "correcta": "Política de prevención, organización de la prevención, evaluación de riesgos, planificación de la actividad preventiva, ejecución y auditoría."}, {"enunciado": "Se constituirá un Comité de Seguridad y Salud en todas las empresas o centros de trabajo que cuenten con:", "opciones": {"A": "10 o más trabajadores.", "B": "25 o más trabajadores.", "C": "50 o más trabajadores.", "D": "100 o más trabajadores."}, "correcta": "50 o más trabajadores."}, {"enunciado": "Señala la afirmación incorrecta sobre la planificación de la // Estado global
let asignaturaActual = null;
let testPreguntas = [];
let testRespuestas = {};
let testPreguntaIdx = 0;
let repasoPreguntasIds = [];
let repasoRespuestas = {};
let repasoIdx = 0;

// localStorage helpers
function getFalladas(nombreAsig) {
  const key = 'falladas_' + nombreAsig;
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function setFalladas(nombreAsig, arr) {
  localStorage.setItem('falladas_' + nombreAsig, JSON.stringify(arr));
}
function addFallada(nombreAsig, pregunta) {
  let falladas = getFalladas(nombreAsig);
  // Evitar duplicados por enunciado
  if (!falladas.find(f => f.enunciado === pregunta.enunciado)) {
    falladas.push(pregunta);
    setFalladas(nombreAsig, falladas);
  }
}
function removeFallada(nombreAsig, enunciado) {
  let falladas = getFalladas(nombreAsig);
  falladas = falladas.filter(f => f.enunciado !== enunciado);
  setFalladas(nombreAsig, falladas);
}

// Obtener todas las preguntas de una asignatura
function getPreguntasAsignatura(asig) {
  let preguntas = [];
  for (const tema of asig.temas) {
    for (const p of tema.preguntas) {
      preguntas.push({...p, tema: tema.tema});
    }
  }
  return preguntas;
}

// Barajar array (Fisher-Yates)
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Vistas
function mostrarVista(id) {
  ['vista-inicio','vista-asignatura','vista-test','vista-resultado','vista-falladas','vista-repaso']
    .forEach(v => document.getElementById(v).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function irInicio() { mostrarVista('vista-inicio'); }

function irAsignatura() {
  actualizarContadorFalladas();
  mostrarVista('vista-asignatura');
}

function actualizarContadorFalladas() {
  if (!asignaturaActual) return;
  const f = getFalladas(asignaturaActual.nombre);
  document.getElementById('num-falladas').textContent = f.length;
}

// Inicio
function init() {
  const lista = document.getElementById('lista-asignaturas');
  DATOS.forEach((asig, idx) => {
    const btn = document.createElement('button');
    btn.className = 'asignatura-btn';
    btn.textContent = asig.nombre;
    btn.onclick = () => seleccionarAsignatura(idx);
    lista.appendChild(btn);
  });
}

function seleccionarAsignatura(idx) {
  asignaturaActual = DATOS[idx];
  document.getElementById('nombre-asignatura').textContent = asignaturaActual.nombre;
  actualizarContadorFalladas();
  mostrarVista('vista-asignatura');
}

// TEST
function generarTest(numPreguntas = 50) {
  const todasPreguntas = getPreguntasAsignatura(asignaturaActual);
  const cantidad = Math.min(numPreguntas, todasPreguntas.length);

  testPreguntas = shuffle([...todasPreguntas]).slice(0, cantidad);
  testRespuestas = {};
  testPreguntaIdx = 0;

  document.getElementById('test-titulo').textContent =
    cantidad === todasPreguntas.length
      ? 'Examen completo: ' + asignaturaActual.nombre
      : 'Test: ' + asignaturaActual.nombre;

  mostrarVista('vista-test');
  renderPreguntaTest();
}

function generarTestCompleto() {
  const todasPreguntas = getPreguntasAsignatura(asignaturaActual);
  generarTest(todasPreguntas.length);
}

function renderPreguntaTest() {
  const total = testPreguntas.length;
  const p = testPreguntas[testPreguntaIdx];
  const respondida = testRespuestas[testPreguntaIdx];

  document.getElementById('progreso').textContent = 
    `Pregunta ${testPreguntaIdx + 1} de ${total}`;

  const container = document.getElementById('pregunta-container');
  
  let html = `<p><strong>Tema ${p.tema} — Pregunta ${testPreguntaIdx + 1}</strong></p>`;
  html += `<p>${p.enunciado}</p><div class="opciones">`;
  
  const letras = Object.keys(p.opciones);
  for (const letra of letras) {
    const texto = p.opciones[letra];
    const esCorrecta = texto === p.correcta;
    let clase = '';
    if (respondida !== undefined) {
      if (esCorrecta) clase = 'correcta';
      else if (respondida === letra) clase = 'incorrecta';
    }
    const checked = respondida === letra ? 'checked' : '';
    const disabled = respondida !== undefined ? 'disabled' : '';
    html += `<label class="${clase}">
      <input type="radio" name="opcion" value="${letra}" ${checked} ${disabled}
        onchange="responderTest('${letra}')">
      ${letra}. ${texto}
    </label>`;
  }
  html += '</div>';
  
  if (respondida !== undefined) {
    const correctaTexto = p.correcta;
    const acerto = p.opciones[respondida] === correctaTexto;
    html += `<p class="${acerto ? 'correcta' : 'incorrecta'}">${acerto ? '✓ Correcto' : '✗ Incorrecto. Respuesta correcta: ' + correctaTexto}</p>`;
  }
  
  container.innerHTML = html;
  
  // Navegación
  document.getElementById('btn-anterior').disabled = testPreguntaIdx === 0;
  
  const esUltima = testPreguntaIdx === total - 1;
  const todasRespondidas = Object.keys(testRespuestas).length === total;
  
  document.getElementById('btn-siguiente').classList.toggle('hidden', esUltima);
  document.getElementById('btn-finalizar').classList.toggle('hidden', !esUltima && !todasRespondidas);
  if (esUltima) {
    document.getElementById('btn-finalizar').classList.remove('hidden');
  }
}

function responderTest(letra) {
  if (testRespuestas[testPreguntaIdx] !== undefined) return;
  const p = testPreguntas[testPreguntaIdx];
  testRespuestas[testPreguntaIdx] = letra;
  
  const acerto = p.opciones[letra] === p.correcta;
  if (!acerto) {
    addFallada(asignaturaActual.nombre, p);
  } else {
    // Si la contestó bien y estaba en falladas, NO la borrar aquí (solo en repaso)
  }
  renderPreguntaTest();
}

function preguntaSiguiente() {
  if (testPreguntaIdx < testPreguntas.length - 1) {
    testPreguntaIdx++;
    renderPreguntaTest();
  }
}

function preguntaAnterior() {
  if (testPreguntaIdx > 0) {
    testPreguntaIdx--;
    renderPreguntaTest();
  }
}

function finalizarTest() {
  const total = testPreguntas.length;
  const respondidas = Object.keys(testRespuestas).length;
  let correctas = 0;
  for (const [idx, letra] of Object.entries(testRespuestas)) {
    const p = testPreguntas[idx];
    if (p.opciones[letra] === p.correcta) correctas++;
  }
  const falladas = getFalladas(asignaturaActual.nombre).length;
  document.getElementById('resultado-final').innerHTML = 
    `Correctas: ${correctas} / ${respondidas}<br>
     Sin responder: ${total - respondidas}<br>
     Preguntas falladas acumuladas: ${falladas}`;
  mostrarVista('vista-resultado');
}

// FALLADAS
function verFalladas() {
  const falladas = getFalladas(asignaturaActual.nombre);
  const lista = document.getElementById('lista-falladas');
  
  if (falladas.length === 0) {
    lista.innerHTML = '<p>No hay preguntas falladas.</p>';
  } else {
    lista.innerHTML = '';
    falladas.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'fallada-item';
      let html = `<p><strong>${i+1}. ${p.enunciado}</strong></p><ul>`;
      for (const [letra, texto] of Object.entries(p.opciones)) {
        const esCorrecta = texto === p.correcta;
        html += `<li class="${esCorrecta ? 'correcta' : ''}">${letra}. ${texto}</li>`;
      }
      html += `</ul><p class="correcta">Correcta: ${p.correcta}</p>`;
      div.innerHTML = html;
      lista.appendChild(div);
    });
  }
  
  const btnRepaso = document.createElement('button');
  btnRepaso.textContent = 'Iniciar repaso';
  btnRepaso.onclick = repasarFalladas;
  lista.prepend(btnRepaso);
  
  mostrarVista('vista-falladas');
}

// REPASO
function repasarFalladas() {
  const falladas = getFalladas(asignaturaActual.nombre);
  if (falladas.length === 0) {
    alert('No hay preguntas falladas para repasar.');
    return;
  }
  repasoPreguntasIds = shuffle(falladas.map((_, i) => i));
  repasoRespuestas = {};
  repasoIdx = 0;
  mostrarVista('vista-repaso');
  renderRepasoActual(getFalladas(asignaturaActual.nombre));
}

function renderRepasoActual(falladas) {
  const total = repasoPreguntasIds.length;
  const pIdx = repasoPreguntasIds[repasoIdx];
  const p = falladas[pIdx];
  const respondida = repasoRespuestas[repasoIdx];

  document.getElementById('progreso-repaso').textContent = 
    `Pregunta ${repasoIdx + 1} de ${total}`;

  const container = document.getElementById('repaso-container');
  let html = `<p>${p.enunciado}</p><div class="opciones">`;
  
  for (const [letra, texto] of Object.entries(p.opciones)) {
    const esCorrecta = texto === p.correcta;
    let clase = '';
    if (respondida !== undefined) {
      if (esCorrecta) clase = 'correcta';
      else if (respondida === letra) clase = 'incorrecta';
    }
    const checked = respondida === letra ? 'checked' : '';
    const disabled = respondida !== undefined ? 'disabled' : '';
    html += `<label class="${clase}">
      <input type="radio" name="opcion_repaso" value="${letra}" ${checked} ${disabled}
        onchange="responderRepaso('${letra}', ${pIdx})">
      ${letra}. ${texto}
    </label>`;
  }
  html += '</div>';
  
  if (respondida !== undefined) {
    const acerto = p.opciones[respondida] === p.correcta;
    html += `<p class="${acerto ? 'correcta' : 'incorrecta'}">${acerto ? '✓ Correcto — se eliminará de falladas' : '✗ Incorrecto. Respuesta correcta: ' + p.correcta}</p>`;
  }
  
  container.innerHTML = html;
  
  document.getElementById('btn-ant-repaso').disabled = repasoIdx === 0;
  const esUltima = repasoIdx === total - 1;
  document.getElementById('btn-sig-repaso').classList.toggle('hidden', esUltima);
  document.getElementById('btn-fin-repaso').classList.toggle('hidden', !esUltima);
  if (esUltima) document.getElementById('btn-fin-repaso').classList.remove('hidden');
}

function responderRepaso(letra, pIdx) {
  if (repasoRespuestas[repasoIdx] !== undefined) return;
  const falladas = getFalladas(asignaturaActual.nombre);
  const p = falladas[pIdx];
  repasoRespuestas[repasoIdx] = letra;
  
  const acerto = p.opciones[letra] === p.correcta;
  if (acerto) {
    removeFallada(asignaturaActual.nombre, p.enunciado);
  }
  
  renderRepasoActual(falladas);
}

function repasoSiguiente() {
  if (repasoIdx < repasoPreguntasIds.length - 1) {
    repasoIdx++;
    renderRepasoActual(getFalladas(asignaturaActual.nombre));
  }
}

function repasoAnterior() {
  if (repasoIdx > 0) {
    repasoIdx--;
    renderRepasoActual(getFalladas(asignaturaActual.nombre));
  }
}

function finalizarRepaso() {
  actualizarContadorFalladas();
  irAsignatura();
}

init();
</script>
